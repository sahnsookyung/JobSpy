name: Build ARM64 JobSpy probe

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: ${{ vars.DOCKERHUB_USERNAME }}/jobspy

jobs:
  build-and-push-probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.arm64-probe
          platforms: linux/arm64
          push: true
          tags: ${{ env.IMAGE_NAME }}:arm64-probe-${{ github.sha }}
          provenance: mode=max
          sbom: true
